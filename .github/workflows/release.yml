name: Publish to Hex

on:
  push:

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: erlef/setup-beam@v1
        with:
          otp-version: "28"
          rebar3-version: "3.27"
      - run: rebar3 compile
      - run: rebar3 hex publish -r hexpm --yes --dry-run
        env:
          HEX_API_KEY: ${{ secrets.HEX_API_KEY }}
